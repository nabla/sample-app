version: 2
updates:
  # Single root install (npm workspaces, one package-lock.json) covers both
  # frontend and backend dependencies.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      all-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      all-actions:
        patterns: ["*"]
